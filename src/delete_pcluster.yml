################################################################################
# Name:     delete_pcluster.yml
# Author:   Rodney Marable <rodney.marable@gmail.com>
# Purpose:  Ansible playbook to delete ParallelCluster v3 stacks
################################################################################

---

- name: Delete an existing ParallelCluster stack
  hosts: local
  connection: local
  gather_facts: false
  vars:
    local_homedir: "{{ lookup('env','HOME') }}"
    local_workingdir: "{{ playbook_dir | dirname }}"
    pcluster_delete_timeout: 80
  vars_files:
    - vars_files/{{ cluster_name }}.yml

  tasks:
    - name: Start a timer for the cluster deletion process
      command: date +%Y-%m-%d\ \@\ %H:%M:%S
      changed_when: false
      register: start_delete_timer

    - name: Print cluster deletion notice
      debug:
        msg:
          - ""
          - "================================================================="
          - "Destroying: {{ cluster_name }} in {{ az }}"
          - "Start Time: {{ start_delete_timer.stdout }}"
          - ""
          - "This process will take approximately 5-10 minutes to complete."
          - "================================================================="
          - ""

    - name: Sync performance results to S3 before cluster deletion
      when: enable_hpc_performance_tests == "true"
      block:
        - name: Get head node IP for performance results sync
          command: >
            pcluster describe-cluster
              --cluster-name {{ cluster_name }}
              --region {{ region }}
          register: _pre_delete_describe
          changed_when: false
          failed_when: false
        - name: Set head node IP fact
          set_fact:
            _head_node_ip: >-
              {{
                (_pre_delete_describe.stdout | from_json).get('headNode', {}).get('publicIpAddress')
                or (_pre_delete_describe.stdout | from_json).get('headNode', {}).get('privateIpAddress', '')
              }}
          when: _pre_delete_describe.rc == 0 and _pre_delete_describe.stdout != ''
        - name: Push performance results from head node to S3
          command: >
            ssh -o BatchMode=yes -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new
            -i "{{ ssh_keypair }}" "{{ ec2_user }}@{{ _head_node_ip }}"
            aws s3 sync "{{ ec2_user_home }}/performance/{{ cluster_name }}/"
            "s3://{{ s3_bucketname }}/performance-results/{{ cluster_name }}/{{ cluster_serial_number }}/"
            --exclude "*.pyc" --exclude "__pycache__/*"
            --region "{{ region }}"
          when: _head_node_ip is defined and _head_node_ip != ''
      rescue:
        - name: Warn that performance results sync failed
          debug:
            msg:
              - "WARNING: Could not sync performance results to S3."
              - "Head node may be unreachable or already terminated."
              - "Results under {{ ec2_user_home }}/performance/{{ cluster_name }}/ on the head node may be lost."
              - "Proceeding with cluster deletion."

    - name: Delete the ParallelCluster v3 stack
      command: >
        pcluster delete-cluster
          --cluster-name {{ cluster_name }}
          --region {{ region }}
      register: pcluster_delete_result
      failed_when: >-
        pcluster_delete_result.rc != 0 and
        "does not exist" not in pcluster_delete_result.stderr and
        "does not exist" not in pcluster_delete_result.stdout and
        "BadRequestException" not in pcluster_delete_result.stderr and
        "BadRequestException" not in pcluster_delete_result.stdout and
        "ClusterNotFound" not in pcluster_delete_result.stderr and
        "ClusterNotFound" not in pcluster_delete_result.stdout

    - name: Wait for the cluster to finish deleting
      command: >
        pcluster describe-cluster
          --cluster-name {{ cluster_name }}
          --region {{ region }}
      register: cluster_delete_status
      until: >-
        "DELETE_COMPLETE" in cluster_delete_status.stdout or
        "DELETE_FAILED" in cluster_delete_status.stdout or
        (cluster_delete_status.rc != 0 and (
          "ClusterNotFound" in cluster_delete_status.stderr or
          "ClusterNotFound" in cluster_delete_status.stdout or
          "does not exist" in cluster_delete_status.stdout or
          "does not exist" in cluster_delete_status.stderr))
      retries: "{{ pcluster_delete_timeout }}"
      delay: 30
      changed_when: false
      failed_when: >-
        cluster_delete_status.rc != 0 and
        "ClusterNotFound" not in cluster_delete_status.stderr and
        "ClusterNotFound" not in cluster_delete_status.stdout and
        "does not exist" not in cluster_delete_status.stdout and
        "does not exist" not in cluster_delete_status.stderr and
        "DELETE_COMPLETE" not in cluster_delete_status.stdout and
        "DELETE_FAILED" not in cluster_delete_status.stdout

    - name: Warn if delete wait timed out without confirmation
      debug:
        msg:
          - "WARNING: cluster deletion wait timed out — cluster may still be deleting."
          - "Check the CloudFormation console before assuming the cluster is gone:"
          - "  aws cloudformation describe-stacks --stack-name parallelcluster-{{ cluster_name }}"
          - "Re-run kill_pcluster.py once the stack reaches DELETE_COMPLETE."
      when: >-
        cluster_delete_status is defined and
        cluster_delete_status.attempts is defined and
        cluster_delete_status.attempts >= (pcluster_delete_timeout | int) and
        "DELETE_COMPLETE" not in cluster_delete_status.stdout and
        "DELETE_FAILED" not in cluster_delete_status.stdout and
        "ClusterNotFound" not in (cluster_delete_status.stderr | default(''))

    - name: Record DELETE_FAILED state without aborting
      set_fact:
        _cf_delete_failed: >-
          {{ cluster_delete_status is defined and
             "DELETE_FAILED" in (cluster_delete_status.stdout | default('')) }}

    - name: Warn operator about DELETE_FAILED — cleanup will still run
      debug:
        msg:
          - "WARNING: CloudFormation stack deletion reached DELETE_FAILED for cluster '{{ cluster_name }}'."
          - "This usually means a resource (ENI, security group, EFA interface) still has dependencies."
          - "IAM roles, keypair, SSM parameters, and S3 resources will still be cleaned up below."
          - "Check the CloudFormation console for the failed resource:"
          - "  aws cloudformation describe-stack-events --stack-name parallelcluster-{{ cluster_name }} --region {{ region }}"
          - "Resolve the CloudFormation dependency and re-run kill_pcluster.py if needed."
      when: _cf_delete_failed | bool

    - name: Delete the EC2 keypair associated with this cluster
      amazon.aws.ec2_key:
        name: "{{ ec2_keypair }}"
        region: "{{ region }}"
        state: absent
      no_log: true
      register: ec2_private_key

    - name: Delete the SSH private key associated with this cluster
      file:
        path: "{{ ssh_keypair }}"
        state: absent

    - name: Remove all custom sbatch performance templates from the src tree
      file:
        path: "{{ item }}"
        state: absent
      with_fileglob:
        - "{{ performance_template_dir }}/sbatch-*.j2"
      ignore_errors: true

    - name: Delete the S3 bucket associated with this cluster
      amazon.aws.s3_bucket:
        name: "{{ s3_bucketname }}"
        region: "{{ region }}"
        state: absent
        force: true
      ignore_errors: true
      when: 'delete_s3_bucketname == "true"'

    - name: Check for the existence of cluster_data_dir
      stat:
        path: "{{ cluster_data_dir }}"
      register: isdir_cdd

    - name: Detach the IAM policy associated with Lustre-S3 hydration before role deletion
      when:
        - enable_fsx_hydration is defined and enable_fsx_hydration == "true"
        - delete_fsx | default('true') == "true"
      block:
        - name: Detach the FSx hydration IAM policy from the role
          amazon.aws.iam_policy:
            iam_type: role
            iam_name: "{{ ec2_iam_role }}"
            policy_name: "{{ fsx_hydration_iam_policy }}"
            state: absent
          ignore_errors: true

    - name: Delete Grafana SSM password parameter
      community.aws.ssm_parameter:
        name: "/parallelcluster/{{ cluster_name }}/grafana/admin-password"
        region: "{{ region }}"
        state: absent
      ignore_errors: true
      when: enable_monitoring is defined and enable_monitoring == "true"

    - name: Detach and delete managed IAM policies associated with the cluster stack
      amazon.aws.iam_managed_policy:
        policy_name: "{{ item }}"
        state: absent
      with_items:
        - "{{ ec2_iam_policy }}-A"
        - "{{ ec2_iam_policy }}-B"
        - "{{ ec2_iam_policy }}-C"
      ignore_errors: true

    - name: Detach and delete monitoring IAM policy
      amazon.aws.iam_managed_policy:
        policy_name: "{{ ec2_iam_policy }}-M"
        state: absent
      ignore_errors: true
      when: enable_monitoring is defined and enable_monitoring == "true"

    - name: Delete the IAM roles associated with the cluster stack
      amazon.aws.iam_role:
        name: "{{ item }}"
        region: "{{ region }}"
        state: absent
        delete_instance_profile: true
      with_items:
        - "{{ ec2_iam_role }}"
      ignore_errors: true

    - name: Delete the external NFS security group associated with this cluster
      amazon.aws.ec2_security_group:
        name: "pcluster-{{ cluster_name }}-externalNfs"
        region: "{{ region }}"
        state: absent
      ignore_errors: true
      when:
        - enable_external_nfs is defined and enable_external_nfs == "true"

    - name: Delete the cluster data directory
      file:
        path: "{{ cluster_data_dir }}"
        state: absent
      when: isdir_cdd.stat.isdir is defined and isdir_cdd.stat.isdir

    - name: Stop the timer
      command: date +%Y-%m-%d\ \@\ %H:%M:%S
      changed_when: false
      register: stop_delete_timer

    - name: Template the cluster destruction summary report
      template:
        src: "{{ sns_destruction_summary_report_src }}"
        dest: "/tmp/sns_destruction_summary.{{ cluster_name }}.txt"
        mode: "0644"
      when: isdir_cdd.stat.isdir is defined and isdir_cdd.stat.isdir

    - name: Distribute the cluster destruction summary report via SNS
      community.aws.sns:
        msg: "{{ lookup('file', '/tmp/sns_destruction_summary.' + cluster_name + '.txt') }}"
        subject: "Cluster Destruction Notice: {{ cluster_name }}"
        topic: "sns_alerts_{{ cluster_name }}"
        region: "{{ region }}"
      ignore_errors: true
      delegate_to: localhost
      when: isdir_cdd.stat.isdir is defined and isdir_cdd.stat.isdir

    - name: Delete the SNS topic associated with this cluster
      community.aws.sns_topic:
        name: "sns_alerts_{{ cluster_name }}"
        region: "{{ region }}"
        state: absent
        subscriptions:
          - endpoint: "{{ cluster_owner_email }}"
            protocol: "email"
      ignore_errors: true

    - name: Print cluster deletion summary
      debug:
        msg:
          - "================================================================="
          - ""
          - "Initiated shutdown: {{ start_delete_timer.stdout }}"
          - "Completed shutdown: {{ stop_delete_timer.stdout }}"
          - ""
          - "Cluster {{ cluster_name }} has been deleted."
          - "================================================================="

    - name: Fail with actionable message after cleanup when CloudFormation reached DELETE_FAILED
      fail:
        msg:
          - "ERROR: CloudFormation stack deletion reached DELETE_FAILED for cluster '{{ cluster_name }}'."
          - "All IAM, keypair, SSM, and S3 resources have been cleaned up."
          - "Resolve the remaining CloudFormation dependency and re-run kill_pcluster.py if needed."
      when: _cf_delete_failed | bool
