[defaults]
retry_files_enabled = False
inventory = ./localhost
enable_plugins = yaml

[ssh_connection]
# Reuse a single TCP connection for all SSH/SCP tasks to the same host.
# Eliminates per-task TCP handshake and key-exchange overhead — measurably
# faster when deploying many files across the ~15 sequential SSH tasks.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining = True
